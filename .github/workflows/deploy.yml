name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Compute Password Hashes
        run: |
          if [ -z "$VIEW_PASSWORD" ]; then echo "ERROR: VIEW_PASSWORD secret is not set"; exit 1; fi
          if [ -z "$EDITOR_TOKEN" ]; then echo "ERROR: EDITOR_TOKEN secret is not set"; exit 1; fi
          VIEW_HASH=$(node -e "const crypto = require('crypto'); console.log(crypto.createHash('sha256').update(process.env.VIEW_PASSWORD).digest('hex'));")
          EDITOR_HASH=$(node -e "const crypto = require('crypto'); console.log(crypto.createHash('sha256').update(process.env.EDITOR_TOKEN).digest('hex'));")
          echo "VIEW_PASSWORD_HASH=$VIEW_HASH" >> $GITHUB_ENV
          echo "EDITOR_TOKEN_HASH=$EDITOR_HASH" >> $GITHUB_ENV
        env:
          VIEW_PASSWORD: ${{ secrets.VIEW_PASSWORD }}
          EDITOR_TOKEN: ${{ secrets.EDITOR_TOKEN }}

      - name: Inject Hashes into HTML
        run: |
          mkdir -p _site
          sed "s/__VIEW_PASSWORD_HASH__/$VIEW_PASSWORD_HASH/; s/__EDITOR_TOKEN_HASH__/$EDITOR_TOKEN_HASH/" index.html > _site/index.html
          # Verify injection worked
          if grep -q '__VIEW_PASSWORD_HASH__' _site/index.html; then echo "ERROR: VIEW_PASSWORD_HASH placeholder was not replaced"; exit 1; fi
          if grep -q '__EDITOR_TOKEN_HASH__' _site/index.html; then echo "ERROR: EDITOR_TOKEN_HASH placeholder was not replaced"; exit 1; fi
          echo "Hash injection verified successfully"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site